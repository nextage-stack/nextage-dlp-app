name: Deploy to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SWA_HOSTNAME: ${{ secrets.SWA_HOSTNAME }}
          FUNCTIONS_HOSTNAME: ${{ secrets.FUNCTIONS_HOSTNAME }}
          ENTRA_APP_CLIENT_ID: ${{ secrets.ENTRA_APP_CLIENT_ID }}
          MANIFEST_GUID: ${{ secrets.MANIFEST_GUID }}
          AZURE_FUNCTIONS_URL: ${{ secrets.AZURE_FUNCTIONS_URL }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Nextage-dlp-app'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./dist
